<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CosmoSync</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#0b0b0c">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* CSS RESET & VARIABLES */
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-color: #0b0b0c; --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.06); --accent-amber: #f39c12;
            --accent-terracotta: #e67e22; --text-main: #f5f5f7; --text-muted: #8e8e93;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        }
        body { font-family: var(--font-family); background-color: var(--bg-color); color: var(--text-main); min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 20px; padding-bottom: 100px; flex: 1; }
        
        /* ANIMAZIONI FLUIDE */
        .app-section { display: none; opacity: 0; transition: opacity 0.4s ease, transform 0.4s ease; transform: translateY(10px); }
        .app-section.active { display: block; opacity: 1; transform: translateY(0); }
        
        header { text-align: center; margin-bottom: 25px; padding-top: 10px; }
        header h1 { font-size: 24px; font-weight: 700; background: linear-gradient(135deg, var(--text-main), var(--accent-amber)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .card { background: var(--card-bg); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid var(--card-border); border-radius: 16px; padding: 20px; margin-bottom: 20px; box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37); overflow: hidden; position: relative;}
        .card-title { font-size: 14px; font-weight: 600; text-transform: uppercase; color: var(--accent-amber); margin-bottom: 15px; }
        
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
        .form-group input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid var(--card-border); border-radius: 8px; padding: 12px; color: var(--text-main); outline: none; }
        
        .btn { width: 100%; background: linear-gradient(135deg, var(--accent-terracotta), var(--accent-amber)); border: none; border-radius: 10px; padding: 14px; color: #000; font-weight: 700; text-transform: uppercase; cursor: pointer; margin-top: 10px; }
        .btn-outline { background: transparent; border: 1px solid var(--accent-amber); color: var(--accent-amber); }
        
        /* DASHBOARD NASA */
        #nasa-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; z-index: -1; }
        .data-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px; }
        .data-item { background: rgba(0, 0, 0, 0.4); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 10px; padding: 12px; text-align: center; backdrop-filter: blur(5px); }
        .data-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; }
        .data-value { font-size: 15px; font-weight: 600; }
        
        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; left: 50%; transform: translateX(-50%); width: 100%; max-width: 480px; background: rgba(11, 11, 12, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--card-border); display: flex; justify-content: space-around; padding: 12px 0; z-index: 1000; }
        .nav-item { background: none; border: none; color: var(--text-muted); font-size: 11px; text-transform: uppercase; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 4px; }
        .nav-item.active { color: var(--accent-amber); }
    </style>
</head>
<body>
    <div class="app-container">
        <header>
            <h1>CosmoSync</h1>
        </header>

        <section id="sec-profile" class="app-section active">
            <div class="card">
                <div class="card-title">Configurazione Astrale</div>
                <div class="form-group"><label>Nome</label><input type="text" id="user-name" placeholder="Il tuo nome"></div>
                <div class="form-group"><label>Data di Nascita</label><input type="date" id="birth-date"></div>
                <div class="form-group"><label>Ora Esatta</label><input type="time" id="birth-time"></div>
                <button class="btn" onclick="saveProfile()">Sincronizza</button>
            </div>
            <div id="natal-summary-card" class="card" style="display: none;">
                <div class="card-title">Il Tuo Big Three</div>
                <div class="data-grid">
                    <div class="data-item"><div class="data-label">Sole</div><div class="data-value" id="summary-sun">-</div></div>
                    <div class="data-item"><div class="data-label">Luna</div><div class="data-value" id="summary-moon">-</div></div>
                </div>
                <div class="data-grid">
                    <div class="data-item" style="grid-column: span 2;"><div class="data-label">Ascendente</div><div class="data-value" id="summary-asc">-</div></div>
                </div>
            </div>
        </section>

        <section id="sec-dashboard" class="app-section">
            <div class="card" style="min-height: 200px;">
                <img id="nasa-bg" src="" alt="Spazio">
                <div class="card-title" style="color: #fff; text-shadow: 0 2px 4px rgba(0,0,0,0.8);">Meteo Spaziale (NASA)</div>
                <div class="data-grid">
                    <div class="data-item"><div class="data-label">Soggetto Oggetto</div><div class="data-value" id="nasa-title" style="font-size: 12px;">Caricamento...</div></div>
                    <div class="data-item"><div class="data-label">Fase Lunare</div><div class="data-value">Crescente</div></div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">Bollettino Personale</div>
                <p id="daily-bulletin" style="font-size: 13px; line-height: 1.6; color: #e2e2e5;">Imposta il profilo per leggere i transiti.</p>
            </div>
        </section>

        <section id="sec-bio" class="app-section">
            <div class="card">
                <div class="card-title">Registra Energia</div>
                <div class="form-group"><label>Energia Fisica (1-10)</label><input type="range" id="slider-energy" min="1" max="10" value="5"></div>
                <div class="form-group"><label>Qualità Sonno (1-10)</label><input type="range" id="slider-sleep" min="1" max="10" value="5"></div>
                <button class="btn" onclick="saveBioLog()">Salva Log</button>
            </div>
            <div class="card" id="chart-card" style="display: none;">
                <div class="card-title">Visualizzazione Dati</div>
                <canvas id="bioChart" width="100" height="60"></canvas>
                <button class="btn btn-outline" style="margin-top: 20px;" onclick="exportCSV()">Scarica Dati (.CSV)</button>
            </div>
        </section>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchTab('sec-profile', this)"><span>🌌 Profilo</span></button>
        <button class="nav-item" onclick="switchTab('sec-dashboard', this)"><span>☀️ Cosmo</span></button>
        <button class="nav-item" onclick="switchTab('sec-bio', this)"><span>🔋 BioSync</span></button>
    </nav>

    <script>
        const zodiacSigns = ["Ariete", "Toro", "Gemelli", "Cancro", "Leone", "Vergine", "Bilancia", "Scorpione", "Sagittario", "Capricorno", "Acquario", "Pesci"];
        let myChart = null;

        // ANIMATED TAB SWITCH
        function switchTab(sectionId, element) {
            document.querySelectorAll('.app-section').forEach(sec => { sec.style.opacity = '0'; setTimeout(() => sec.classList.remove('active'), 200); });
            document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
            setTimeout(() => {
                const target = document.getElementById(sectionId);
                target.classList.add('active');
                setTimeout(() => target.style.opacity = '1', 50);
            }, 200);
            element.classList.add('active');
        }

        // CALCOLO MATEMATICO
        function getSunSign(day, month) {
            if ((month == 3 && day >= 21) || (month == 4 && day <= 19)) return 0;
            if ((month == 4 && day >= 20) || (month == 5 && day <= 20)) return 1;
            if ((month == 5 && day >= 21) || (month == 6 && day <= 20)) return 2;
            if ((month == 6 && day >= 21) || (month == 7 && day <= 22)) return 3;
            if ((month == 7 && day >= 23) || (month == 8 && day <= 22)) return 4;
            if ((month == 8 && day >= 23) || (month == 9 && day <= 22)) return 5;
            if ((month == 9 && day >= 23) || (month == 10 && day <= 22)) return 6;
            if ((month == 10 && day >= 23) || (month == 11 && day <= 21)) return 7;
            if ((month == 11 && day >= 22) || (month == 12 && day <= 21)) return 8;
            if ((month == 12 && day >= 22) || (month == 1 && day <= 19)) return 9;
            if ((month == 1 && day >= 20) || (month == 2 && day <= 18)) return 10;
            return 11;
        }
        function getMoonSign(y, m, day) {
            if (m < 3) { y--; m += 12; }
            const jd = Math.floor(365.25 * (y + 4716)) + Math.floor(30.6001 * (m + 1)) + day + (2 - Math.floor(y / 100) + Math.floor(Math.floor(y / 100) / 4)) - 1524.5;
            let moonLong = (218.316 + (13.176396 * (jd - 2451545.0))) % 360;
            if (moonLong < 0) moonLong += 360;
            return Math.floor(moonLong / 30);
        }
        function getAscendant(sunIdx, hour) {
            let ascIdx = (sunIdx + Math.floor((hour - 6) / 2)) % 12;
            return ascIdx < 0 ? ascIdx + 12 : ascIdx;
        }

        function saveProfile() {
            const name = document.getElementById('user-name').value || "Utente";
            const dateStr = document.getElementById('birth-date').value;
            const timeStr = document.getElementById('birth-time').value;
            if(!dateStr || !timeStr) return alert("Inserisci data e ora!");
            const [y, m, d] = dateStr.split('-').map(Number);
            const sun = getSunSign(d, m), moon = getMoonSign(y, m, d), asc = getAscendant(sun, parseInt(timeStr.split(':')[0]));
            const prof = { name, sun: zodiacSigns[sun], moon: zodiacSigns[moon], ascendant: zodiacSigns[asc] };
            localStorage.setItem('cs_prof', JSON.stringify(prof));
            renderProfile(prof);
        }

        function renderProfile(p) {
            document.getElementById('natal-summary-card').style.display = 'block';
            document.getElementById('summary-sun').innerText = p.sun;
            document.getElementById('summary-moon').innerText = p.moon;
            document.getElementById('summary-asc').innerText = p.ascendant;
            document.getElementById('daily-bulletin').innerText = `${p.name}, le letture indicano forte attività nel tuo segno (${p.sun}). Emozioni amplificate dalla Luna in ${p.moon}.`;
        }

        // NASA API FETCH
        async function fetchNASA() {
            try {
                const res = await fetch('https://api.nasa.gov/planetary/apod?api_key=DEMO_KEY');
                const data = await res.json();
                document.getElementById('nasa-bg').src = data.url;
                document.getElementById('nasa-title').innerText = data.title.substring(0, 20) + '...';
            } catch(e) { document.getElementById('nasa-title').innerText = "Spazio Profondo"; }
        }

        // BIOSYNC & CHART.JS
        function saveBioLog() {
            const e = document.getElementById('slider-energy').value, s = document.getElementById('slider-sleep').value;
            let logs = JSON.parse(localStorage.getItem('cs_logs') || '[]');
            logs.push({ date: new Date().toLocaleDateString(), energy: e, sleep: s });
            localStorage.setItem('cs_logs', JSON.stringify(logs));
            renderChart();
        }

        function renderChart() {
            const logs = JSON.parse(localStorage.getItem('cs_logs') || '[]');
            if(logs.length === 0) return;
            document.getElementById('chart-card').style.display = 'block';
            const ctx = document.getElementById('bioChart').getContext('2d');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: logs.map(l => l.date),
                    datasets: [
                        { label: 'Energia', data: logs.map(l => l.energy), borderColor: '#f39c12', tension: 0.4 },
                        { label: 'Sonno', data: logs.map(l => l.sleep), borderColor: '#e67e22', borderDash: [5, 5], tension: 0.4 }
                    ]
                },
                options: { scales: { y: { min: 0, max: 10, ticks: { color: '#8e8e93' } }, x: { ticks: { color: '#8e8e93' } } }, plugins: { legend: { labels: { color: '#fff' } } } }
            });
        }

        // EXPORT CSV
        function exportCSV() {
            const logs = JSON.parse(localStorage.getItem('cs_logs') || '[]');
            let csv = "Data,Energia,Sonno\n" + logs.map(l => `${l.date},${l.energy},${l.sleep}`).join("\n");
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.setAttribute('href', url);
            a.setAttribute('download', 'biosync_data.csv');
            a.click();
        }

        // INIT & SERVICE WORKER
        window.onload = () => {
            fetchNASA();
            renderChart();
            if(localStorage.getItem('cs_prof')) renderProfile(JSON.parse(localStorage.getItem('cs_prof')));
            if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');
        };
    </script>
</body>
</html>
