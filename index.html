<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CosmoSync</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#13111c">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg-base: #0f0e15;
            --panel-bg: rgba(28, 26, 41, 0.65);
            --panel-border: rgba(243, 156, 18, 0.15);
            --accent-gold: #f39c12;
            --accent-terracotta: #e67e22;
            --text-main: #fcfbf4; 
            --text-muted: #a4a2b0;
            --font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        body {
            font-family: var(--font-family); background-color: var(--bg-base);
            color: var(--text-main); min-height: 100vh; display: flex;
            flex-direction: column; overflow-x: hidden; -webkit-font-smoothing: antialiased;
        }

        .cosmic-background {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: radial-gradient(circle at 80% 20%, #21153b 0%, #0f0e15 70%);
            z-index: -2; overflow: hidden;
        }
        .ambient-glow {
            position: absolute; bottom: -10%; right: -10%; width: 60vw; height: 60vw;
            background: radial-gradient(circle, rgba(126, 87, 194, 0.15) 0%, rgba(0,0,0,0) 70%);
            z-index: -1; filter: blur(50px); animation: pulseGlow 12s infinite ease-in-out;
        }
        .orbiting-element {
            position: absolute; top: 15%; right: 10%; width: 40px; height: 40px;
            border: 1px solid rgba(255,255,255,0.05); border-radius: 50%;
            animation: spinOrbit 25s infinite linear;
        }
        .orbiting-element::after {
            content: ''; position: absolute; top: 0; left: 50%; width: 6px; height: 6px;
            background: var(--accent-gold); border-radius: 50%; box-shadow: 0 0 8px var(--accent-gold);
        }

        @keyframes pulseGlow { 0%, 100% { transform: scale(1); opacity: 0.8; } 50% { transform: scale(1.1); opacity: 1; } }
        @keyframes spinOrbit { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .app-container { width: 100%; max-width: 480px; margin: 0 auto; padding: 24px; padding-bottom: 110px; flex: 1; }
        header { text-align: center; margin-bottom: 28px; padding-top: 10px; }
        header h1 { font-size: 26px; font-weight: 700; letter-spacing: 3px; background: linear-gradient(135deg, var(--text-main), var(--accent-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        header p { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 4px; margin-top: 6px; }

        .card { background: var(--panel-bg); backdrop-filter: blur(20px); border: 1px solid var(--panel-border); border-radius: 20px; padding: 22px; margin-bottom: 20px; box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5); position: relative; z-index: 1; }
        .card-title { font-size: 13px; font-weight: 600; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 18px; color: var(--accent-gold); display: flex; align-items: center; justify-content: space-between; }

        .app-section { display: none; opacity: 0; transform: translateY(12px); transition: opacity 0.35s ease, transform 0.35s ease; }
        .app-section.active { display: block; opacity: 1; transform: translateY(0); }

        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 10px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; letter-spacing: 1px; }
        .form-group input { width: 100%; background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.08); border-radius: 10px; padding: 14px; color: var(--text-main); font-family: var(--font-family); font-size: 14px; outline: none; transition: all 0.3s ease; }
        .form-group input:focus { border-color: var(--accent-gold); background: rgba(255, 255, 255, 0.07); box-shadow: 0 0 10px rgba(243, 156, 18, 0.1); }

        .slider-header { display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 8px; color: var(--text-main); }
        input[type="range"] { -webkit-appearance: none; width: 100%; height: 5px; border-radius: 3px; background: rgba(255, 255, 255, 0.12); outline: none; margin-bottom: 20px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; border-radius: 50%; background: linear-gradient(135deg, var(--accent-terracotta), var(--accent-gold)); cursor: pointer; box-shadow: 0 0 10px var(--accent-gold); }

        .btn { width: 100%; background: linear-gradient(135deg, var(--accent-terracotta), var(--accent-gold)); border: none; border-radius: 12px; padding: 15px; color: #0b0e14; font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(230, 126, 34, 0.2); }
        .btn-outline { background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); box-shadow: none; margin-top: 12px; }

        .data-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 14px; }
        .data-item { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.04); border-radius: 12px; padding: 14px; text-align: center; }
